# ghostty.conf — the `ghostty` profile (tmux config block)
#
# Profile: ghostty — Ghostty owns the mouse. tmux stays off the alternate
# screen so append-only output feeds Ghostty's native scrollback.
#
# Drop this into your ~/.tmux.conf (or source it with:
#   source-file ~/.config/ghostmux/tmux/ghostty.conf)
#
# What it does: disables tmux's mouse layer so Ghostty owns all scrolling,
# selection, and clipboard natively, and keeps tmux off the alternate screen
# so pane output streams into Ghostty's own scrollback buffer. You get plain
# trackpad scroll, drag/double-click/triple-click selection, cmd+C / cmd+V,
# and cmd+left / cmd+right — natively, with tmux sessions intact underneath.
#
# HONEST CEILING: this is coherent for append-only / shell output. It does
# NOT give clean scroll-back of a LIVE full-screen TUI (Claude Code, vim,
# lazygit): a TUI overwrites its grid in place, so what reaches Ghostty's
# scrollback is a record of repaints and renders as garble. For those panes
# use `prefix [` (tmux copy-mode) or the app's own scroll. If your day is
# mostly live TUIs, use the `tmux` profile (tmux/tmux.conf) instead.
#
# Companion changes required (see ghostty/config, claude/, and zsh/bindkeys.zsh):
#   - Ghostty: scrollback-limit = 100000000, mouse-shift-capture = never
#   - Ghostty: remove copy-on-select = clipboard (restores select != copy)
#   - Claude Code: "tui": "default" (classic renderer) — load-bearing HERE so
#     Claude output stays append-only and Ghostty scrollback stays coherent
#   - zsh: bindkey -M viins for ^A / ^E if EDITOR=nvim (vi keymap)
#
# After sourcing, existing attached clients keep the old behaviour until they
# re-attach: detach + re-attach each client (or restart Ghostty) for full
# effect — the alternate-screen override is negotiated at attach time.

# ── Mouse: off ────────────────────────────────────────────────────────────────
# With mouse off, tmux never intercepts wheel or click events. All mouse
# input goes directly to Ghostty, which handles it natively.
set -g mouse off

# ── Alternate screen suppression ─────────────────────────────────────────────
# smcup@/rmcup@ removes the "enter/exit alternate screen" capability for
# xterm-ghostty clients. tmux normally switches to the alternate screen on
# attach (hiding scrollback); with this override, it does not — pane output
# flows into Ghostty's scrollback instead of a separate buffer.
# This is a client-negotiated setting: it takes effect on the NEXT attach,
# not for already-attached clients.
set -as terminal-overrides ',xterm-ghostty:smcup@:rmcup@'

# ── Terminal features for Ghostty ─────────────────────────────────────────────
# clipboard: enables OSC 52 clipboard integration (tmux set-clipboard on +
#   Ghostty support = cmd+C writes to macOS clipboard without pbcopy).
# extkeys: enables extended key sequences (CSI-u) so modified keys like
#   shift+enter work correctly through the tmux layer.
set -as terminal-features ',xterm-ghostty:clipboard,extkeys'

# ── Copy-mode colours (KaosMaps brand green, #00ff77) ───────────────────────
# These style the incremental search and selection highlight in tmux's own
# copy-mode (prefix+[ — available as a fallback for deep history, search, or
# scrolling a live-TUI pane). The active selection is deliberately bright-green
# so it is visible against any content; the current search match uses magenta.
set -g mode-style 'fg=#000000,bg=#00ff77'
set -g copy-mode-match-style 'fg=#000000,bg=#00ff77'
set -g copy-mode-current-match-style 'fg=#000000,bg=#ff2bd6'

# ── Pane borders ─────────────────────────────────────────────────────────────
# Active pane border in the same bright green (#00ff77); inactive in dark
# green so the split is visible without being distracting.
set -g pane-active-border-style 'fg=#00ff77'
set -g pane-border-style 'fg=#1f5f3f'

# ── Status bar colours ────────────────────────────────────────────────────────
# Black/green scheme consistent with the selection colours above.
set -g status-style 'fg=#00ff77,bg=#000000'
set -g status-left-style 'fg=#000000,bg=#00ff77,bold'
set -g status-right-style 'fg=#00ff77,bg=#000000'
set -g message-style 'fg=#000000,bg=#00ff77'

# ── Clipboard and history ─────────────────────────────────────────────────────
# set-clipboard on: tmux writes OSC 52 sequences so selections in intentional
#   copy-mode (prefix+[, press y) reach the system clipboard.
# history-limit: 100,000 lines per pane — enough for day-long agent sessions
#   reachable via prefix+[ when they've scrolled out of Ghostty's buffer.
set -g set-clipboard on
set -g history-limit 100000

# ── Focus events ──────────────────────────────────────────────────────────────
# Passes FocusIn/FocusOut events through to pane processes (vim autoread,
# git-gutter, etc.). Safe with mouse off.
set -g focus-events on
