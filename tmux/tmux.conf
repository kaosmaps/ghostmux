# tmux.conf — the `tmux` profile (tmux config block)
#
# Profile: tmux — tmux owns the mouse. Plain trackpad scroll enters copy-mode
# for coherent scroll-back of ANY pane, including live full-screen TUIs.
#
# Drop this into your ~/.tmux.conf (or source it with:
#   source-file ~/.config/ghostmux/tmux/tmux.conf)
#
# What it does: routes the mouse to tmux (and the focused app). A trackpad
# scroll enters tmux copy-mode, which models the grid rather than the byte
# stream — so it gives clean history even for a repainting TUI (Claude Code,
# vim, lazygit), the case where the `ghostty` profile garbles. Native Ghostty
# selection moves to Shift+drag (still copies with cmd+C). This is the
# future-proof profile as more of your day becomes AI-CLI / TUI time.
#
# There is deliberately NO `smcup@` override here: tmux uses its own alternate
# screen, TUI repaints do not pollute Ghostty's scrollback, and coherent
# history lives in tmux's grid (copy-mode) instead.
#
# Companion changes required (see ghostty/config):
#   - Ghostty: mouse-shift-capture = never  (enables Shift+drag native select)
#   - Ghostty: scrollback-limit = 100000000 (for the occasional Shift+scroll
#     on shell panes)
#   The Claude Code "tui" pin is NOT load-bearing for this profile — with the
#   mouse routed to the app, Claude's own fullscreen renderer + scroll work.
#
# After sourcing, run `tmux source-file ~/.tmux.conf`, then re-attach clients
# for the negotiated state to settle (restart Ghostty is simplest).

# ── Mouse: on ─────────────────────────────────────────────────────────────────
# tmux receives wheel + click + drag. This is the one decision that defines
# the profile: whoever owns the mouse owns BOTH scroll and drag (they are the
# same event channel). Scroll -> copy-mode / app scroll; drag -> tmux select.
set -g mouse on

# ── Copy-mode colours (KaosMaps brand green, #00ff77) ───────────────────────
# Selection highlight is bright-green; the current search match uses magenta.
# In this profile copy-mode is the PRIMARY scroll surface, not a fallback.
set -g mode-style 'fg=#000000,bg=#00ff77'
set -g copy-mode-match-style 'fg=#000000,bg=#00ff77'
set -g copy-mode-current-match-style 'fg=#000000,bg=#ff2bd6'

# ── Pane borders ─────────────────────────────────────────────────────────────
set -g pane-active-border-style 'fg=#00ff77'
set -g pane-border-style 'fg=#1f5f3f'

# ── Status bar colours ────────────────────────────────────────────────────────
set -g status-style 'fg=#00ff77,bg=#000000'
set -g status-left-style 'fg=#000000,bg=#00ff77,bold'
set -g status-right-style 'fg=#00ff77,bg=#000000'
set -g message-style 'fg=#000000,bg=#00ff77'

# ── Clipboard and history ─────────────────────────────────────────────────────
# set-clipboard on: copy-mode selections reach the system clipboard via OSC 52.
# history-limit: 100,000 lines per pane of copy-mode-scrollable history.
set -g set-clipboard on
set -g history-limit 100000

# ── Focus events ──────────────────────────────────────────────────────────────
set -g focus-events on

# ── vi copy-mode ──────────────────────────────────────────────────────────────
# vi-style motion keys inside copy-mode (h/j/k/l, /search, v to select).
setw -g mode-keys vi

# ── Mouse drag → copy-selection (selection stays visible) ─────────────────────
# When you finish a plain drag inside copy-mode, copy the selection WITHOUT
# clearing it, so the highlight stays on screen (copy-selection-no-clear).
# Bound for both the vi and emacs copy-mode tables so it works regardless of
# mode-keys.
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-selection-no-clear
bind-key -T copy-mode MouseDragEnd1Pane send-keys -X copy-selection-no-clear

# ── Wheel → copy-mode scroll ──────────────────────────────────────────────────
# A wheel/trackpad tick selects the pane and scrolls copy-mode by 2 lines,
# entering copy-mode if not already in it. This is what turns plain trackpad
# scroll into coherent scroll-back of any pane. Exit copy-mode: scroll to the
# bottom or press `q`.
bind-key -T copy-mode-vi WheelUpPane select-pane \; send-keys -X -N 2 scroll-up
bind-key -T copy-mode-vi WheelDownPane select-pane \; send-keys -X -N 2 scroll-down
bind-key -T copy-mode WheelUpPane select-pane \; send-keys -X -N 2 scroll-up
bind-key -T copy-mode WheelDownPane select-pane \; send-keys -X -N 2 scroll-down
